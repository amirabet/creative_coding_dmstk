<!doctype html>
<html lang="en">
	<!-- https://codepen.io/amirabet/pen/pvEMJQo -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sketch 02</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      canvas {
        width: min(100vw, 100vh);
        height: min(100vw, 100vh);
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" width="1080" height="1080"></canvas>
    <script>
      const canvas = document.getElementById("canvas");
      const context = canvas.getContext("2d");
      const width = canvas.width;
      const height = canvas.height;

      const color_background = "black";
      const color_elements = "white";
      const color_highlight = "red";

      const degToRad = (deg) => (deg * Math.PI) / 180;
      const randomRange = (min, max) => Math.random() * (max - min) + min;

      let random_vars = [];

      function draw() {
        const date = new Date();
        const secs = date.getSeconds();
        const mins = date.getMinutes();
        const hours =
          date.getHours() > 12 ? date.getHours() - 12 : date.getHours();
        const redraw = secs === 0;

        context.fillStyle = color_background;
        context.fillRect(0, 0, width, height);

        context.fillStyle = color_elements;
        const cx = width * 0.5;
        const cy = height * 0.5;
        const w = width * 0.01;
        const h = height * 0.1;

        const slices = 36;
        const slice = degToRad(360 / slices);
        const radius = width * 0.3;

        for (let i = 0; i < slices; i++) {
          const angle = slice * i;
          const x = cx + radius * Math.sin(angle);
          const y = cy + radius * Math.cos(angle);

          if (!random_vars[i] || redraw) {
            if (!random_vars[i]) random_vars[i] = {};
            random_vars[i].scale_x = randomRange(0.1, 2);
            random_vars[i].scale_y = randomRange(0.2, 0.8);
            random_vars[i].rect_y = randomRange(0, -h * 0.5);
            random_vars[i].arc_lineWidth = randomRange(
              width * 0.005,
              width * 0.019,
            );
            random_vars[i].arc_radio = radius * randomRange(0.7, 1.3);
            random_vars[i].arc_start = slice * randomRange(-8, 1);
            random_vars[i].arc_end = slice * randomRange(1, 5);
          }

          context.save();
          context.translate(x, y);
          context.rotate(-angle);
          context.scale(random_vars[i].scale_x, random_vars[i].scale_y);
          context.beginPath();
          context.rect(-w * 0.5, random_vars[i].rect_y, w, h);
          context.fill();
          context.restore();

          context.save();
          context.translate(cx, cy);
          context.rotate(-angle);
          context.lineWidth = random_vars[i].arc_lineWidth;
          context.strokeStyle = color_elements;
          context.beginPath();
          context.arc(
            0,
            0,
            random_vars[i].arc_radio,
            random_vars[i].arc_start,
            random_vars[i].arc_end,
          );
          context.stroke();
          context.restore();
        }

        context.save();
        context.translate(cx, cy);
        context.rotate(degToRad(-90));
        context.lineWidth = width * 0.013;
        context.strokeStyle = color_highlight;
        context.beginPath();
        context.arc(0, 0, width * 0.14, 0, degToRad(secs * 6));
        context.stroke();
        context.beginPath();
        context.arc(0, 0, width * 0.16, 0, degToRad(mins * 6));
        context.stroke();
        context.beginPath();
        context.arc(0, 0, width * 0.18, 0, degToRad(hours * 30));
        context.stroke();
        context.restore();

        for (let i = 0; i < 12; i++) {
          const angle = degToRad(360 / 12) * i;
          context.save();
          context.fillStyle = color_background;
          context.translate(cx, cy);
          context.rotate(-angle);
          context.beginPath();
          context.rect(-w * 0.1, height * 0.002, w * 1, h * 2.1);
          context.fill();
          context.restore();
        }
      }

      draw();
      setInterval(draw, 1000);
    </script>
  </body>
</html>
